<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{
  margin:0;
  min-height:100vh;
  background:#0b0b0f;
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{
  width:620px;
  background:#16161c;
  border:1px solid #2b2b34;
  border-radius:24px;
  padding:30px;
}
input,select,button{
  width:100%;
  padding:14px;
  border-radius:14px;
  box-sizing:border-box;
  margin-top:12px;
  font-size:16px;
}
input,select{
  background:#0f0f13;
  color:white;
  border:1px solid #333;
}
button{
  border:0;
  background:linear-gradient(135deg,#25f4ee,#fe2c55);
  color:white;
  font-weight:900;
  cursor:pointer;
}
.themes{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}
.theme{
  background:#0f0f13;
  border:2px solid #2b2b34;
  border-radius:16px;
  padding:14px;
  cursor:pointer;
  text-align:center;
  font-weight:900;
}
.theme.active{
  border-color:#25f4ee;
  box-shadow:0 0 20px rgba(37,244,238,.35);
}
.linkBox{
  margin-top:18px;
  background:#0f0f13;
  border-radius:14px;
  padding:14px;
  word-break:break-all;
  display:none;
}
a{color:#25f4ee;font-weight:900}
.logout{background:#2c2c35}
</style>
</head>
<body>

<div class="box">
  <h1>Overlay Dashboard</h1>
  <div id="userInfo">Yüklənir...</div>

  <input id="username" placeholder="TikTok username">

  <h3>Dizayn seç</h3>

  <div class="themes">
    <div class="theme active" onclick="setTheme('classic',this)">Classic</div>
    <div class="theme" onclick="setTheme('neon',this)">Neon</div>
    <div class="theme" onclick="setTheme('gold',this)">Gold</div>
    <div class="theme" onclick="setTheme('pubg',this)">PUBG Mobile</div>
    <div class="theme" onclick="setTheme('fire',this)">Fire</div>
    <div class="theme" onclick="setTheme('ice',this)">Ice</div>
  </div>

  <button onclick="saveUsername()">Overlay yarat</button>

  <div class="linkBox" id="overlayBox"></div>

  <button class="logout" onclick="logout()">Çıxış et</button>
</div>

<script>
let selectedTheme = "classic";

function setTheme(theme,el){
  selectedTheme = theme;
  document.querySelectorAll(".theme").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

async function loadUser(){
  const res = await fetch("/me");
  const data = await res.json();

  if(!data.loggedIn){
    location.href = "/login.html";
    return;
  }

  document.getElementById("userInfo").innerHTML = `Email: ${data.user.email}`;

  if(data.user.tiktok_username){
    document.getElementById("username").value = data.user.tiktok_username;
    showOverlay(data.user.tiktok_username);
  }
}

function showOverlay(username){
  const link = `${location.origin}/overlay.html?user=${encodeURIComponent(username)}&theme=${selectedTheme}`;

  const box = document.getElementById("overlayBox");
  box.style.display = "block";
  box.innerHTML = `
    <div>Overlay linkin:</div><br>
    <a href="${link}" target="_blank">${link}</a>
  `;
}

async function saveUsername(){
  const username = document.getElementById("username").value.trim().replace("@","");

  const res = await fetch("/save-username",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username})
  });

  const data = await res.json();

  if(data.success){
    showOverlay(username);
  }
}

function logout(){
  location.href = "/logout";
}

loadUser();
</script>

</body>
</html>
